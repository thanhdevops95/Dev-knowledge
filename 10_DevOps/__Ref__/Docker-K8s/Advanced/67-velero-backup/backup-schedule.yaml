apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-backup
  namespace: velero
spec:
  schedule: "0 2 * * *"          # 02:00 hằng ngày
  template:
    includedNamespaces:
      - myapp-dev
    ttl: 720h0m0s                # giữ backup 30 ngày
    storageLocation: default
    snapshotVolumes: false       # bật true khi cluster có CSI snapshot driver
