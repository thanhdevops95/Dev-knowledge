apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: myapp-hpa
  namespace: myapp-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: myapp-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60     # chờ 60s trước khi quyết định scale up
      policies:
        - type: Percent
          value: 100                     # tối đa nhân đôi
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300    # cẩn thận hơn khi scale down (5 phút)
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
