# kubernetes/frontend-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # Chú ý: IMAGE_TAG sẽ được thay thế bởi pipeline CI/CD
        image: your-dockerhub-username/todo-frontend:latest
        ports:
        - containerPort: 80 # Cổng Nginx mặc định
