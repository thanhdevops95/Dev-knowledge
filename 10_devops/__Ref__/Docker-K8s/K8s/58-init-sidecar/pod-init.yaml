apiVersion: v1
kind: Pod
metadata:
  name: myapp-with-init
  namespace: myapp-dev
spec:
  initContainers:
    - name: wait-for-db
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          until nc -z db 5432; do
            echo "waiting for db..."
            sleep 2
          done
    - name: run-migration
      image: <YOUR_DOCKERHUB_USERNAME>/myapp:6.0
      command: ["python", "migrate.py"]
  containers:
    - name: myapp
      image: <YOUR_DOCKERHUB_USERNAME>/myapp:6.0
      ports:
        - containerPort: 5000
