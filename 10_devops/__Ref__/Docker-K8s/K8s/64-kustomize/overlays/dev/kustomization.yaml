apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: myapp-dev
resources:
  - ../../base
replicas:
  - name: myapp-deployment
    count: 1
patches:
  - path: patch-replicas.yaml
configMapGenerator:
  - name: myapp-config
    behavior: merge
    literals:
      - APP_ENV=dev
      - LOG_LEVEL=DEBUG
