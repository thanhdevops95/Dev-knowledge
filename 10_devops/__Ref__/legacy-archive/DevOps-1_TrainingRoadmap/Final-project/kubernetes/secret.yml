# kubernetes/secret.yml
# WARNING: Storing secrets directly in YAML is not a best practice for production.
# This is for demonstration purposes. Use tools like HashiCorp Vault or AWS Secrets Manager in a real environment.

apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  # Base64 encoded values. Example: echo -n 'postgres' | base64
  DB_USER: cG9zdGdyZXM= # postgres
  DB_PASSWORD: cGFzc3dvcmQ= # password
  DB_HOST: ZGJzZXJ2ZXI= # dbserver (This would be the RDS endpoint)
  DB_NAME: dG9kb3M= # todos
