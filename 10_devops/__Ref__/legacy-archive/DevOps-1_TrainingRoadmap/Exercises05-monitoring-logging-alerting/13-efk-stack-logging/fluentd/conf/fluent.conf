# fluent.conf
# File cấu hình cho Fluentd, định nghĩa nguồn log và đích đến của log.

# <source>: Định nghĩa nguồn đầu vào của log.
# Fluentd sẽ lắng nghe trên cổng 24224 theo giao thức 'forward'.
# Các Docker container sẽ được cấu hình để gửi log đến đây.
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# <match>: Định nghĩa cách xử lý log dựa trên 'tag'.
# Mọi log có tag khớp với 'docker.**' (ví dụ: docker.my-app) sẽ được xử lý bởi khối này.
<match docker.**>
  @type copy

  # Store 1: Đẩy log đến Elasticsearch
  <store>
    @type elasticsearch
    host elasticsearch # Tên service của Elasticsearch trong docker-compose.
    port 9200
    logstash_format true # Sử dụng định dạng index tương thích với Logstash.
    logstash_prefix docker_logs # Tên index trong Elasticsearch sẽ có dạng: docker_logs-YYYY-MM-DD
    logstash_dateformat %Y%m%d
    include_tag_key true
    type_name _doc
    tag_key @log_name
    flush_interval 1s # Gửi log đến Elasticsearch mỗi giây.
  </store>
  
  # Store 2: In log ra màn hình console của chính container Fluentd.
  # Việc này rất hữu ích cho việc gỡ lỗi (debug).
  <store>
    @type stdout
  </store>
</match>
