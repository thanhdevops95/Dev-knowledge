apiVersion: v1
kind: Pod
metadata:
  name: curl-pod-demo
  labels:
    app: curl-app
    tier: frontend
spec:
  containers:
  - name: curl-app
    image: curlimages/curl:latest
    command: ["sleep"]
    args: ["3600"]
    ports:
    - containerPort: 80
      name: http
      protocol: TCP
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
    # Label được định nghĩa ở metadata, không ở container
